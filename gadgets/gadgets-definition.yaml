workspace:
  enable_all: true
  disable: []

gadgets:
  AudioPlayer:
    scripts:
      - index.js

  BackgroundImage:
    scripts:
      - index.js
    styles:
      - style.less

  CollapseJump:
    description: "Jump to a collapsible element specified in the URL hash"
    scripts:
      - index.js

  DynamicCategories:
    description: "Dynamic, gallery, and classic view switcher for category pages"
    scripts:
      - index.js
    styles:
      - style.less
    resourceLoader:
      dependencies:
        - 'mediawiki.api'

  FilterTable:
    description: "Add filter buttons to a table"
    scripts:
      - index.js

  ImportButton:
    scripts:
      - index.ts

  jswikibot:
    scripts:
      - index.ts
    styles:
      - styles.less
    resourceLoader:
      dependencies:
        - 'oojs-ui-core'
        - 'oojs-ui-windows'
        - 'mediawiki.util'
        - 'mediawiki.api'
        - 'mediawiki.user'
        - 'mediawiki.widgets'
        - 'mediawiki.widgets.datetime'

  StatCalc:
    scripts:
      - index.ts

  Tab:
    scripts:
      - index.js

  VueHelloWorld:
    description: "A test script used as a demonstration of Vue.js and Codex"
    authors:
      - Plantaest
    links:
      - https://en.wikipedia.org/wiki/User:Plantaest/TestVue.js
    scripts:
      - hello-world.ts