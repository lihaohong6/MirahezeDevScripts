workspace:
  enable_all: true

gadgets:
  AudioPlayer:
    scripts:
      - index.js

  BackgroundImage:
    scripts:
      - index.js
    styles:
      - style.less

  CollapseJump:
    description: "Jump to a collapsible element specified in the URL hash"
    scripts:
      - index.js

  DynamicCategories:
    description: "Dynamic, gallery, and classic view switcher for category pages"
    scripts:
      - index.js
    styles:
      - style.less
    resourceLoader:
      dependencies:
        - 'mediawiki.api'

  FilterTable:
    description: "Add filter buttons to a table"
    scripts:
      - index.js

  ImportButton:
    scripts:
      - index.ts

  jswikibot:
    scripts:
      - index.ts
    styles:
      - styles.less
    resourceLoader:
      dependencies:
        - 'oojs-ui-core'
        - 'oojs-ui-windows'
        - 'mediawiki.util'
        - 'mediawiki.api'
        - 'mediawiki.user'
        - 'mediawiki.widgets'
        - 'mediawiki.widgets.datetime'

  StatCalc:
    scripts:
      - index.ts

  Tab:
    scripts:
      - index.js

  AjaxBatchDelete:
    description: "Allows deleting a list of pages in a form and protecting them too."
    authors:
      - Splarka
      - Grunny
      - KnazO
      - KockaAdmiralac
      - ccxtwf / CoolMikeHatsune22 (port)
    links:
      - https://dev.fandom.com/wiki/AjaxBatchDelete
    requires: 
      - FandoomUiUtilsModal
      - PowertoolsPlacement
      - FandoomUtilsI18nLoader
    scripts:
      - code.js
    styles:
      - style.css
    i18n:
      - i18n.json
    resourceLoader:
      rights: "sysop, bureaucrat, global-admin"

  AjaxBatchUndelete:
    description: "Allows batch undeletion of pages."
